<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — paper & ink" subtitle="Cool official paper, white cards, three ink levels, hairlines" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:16px 20px}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{flex:1;min-width:70px;border-radius:12px;padding:10px 12px;border:1px solid var(--line)}.sw b{display:block;font:600 11px/16px var(--font-sans)}.sw span{font:400 10px/14px var(--font-sans);opacity:.75}</style></head><body><div class="row">
<div class="sw" style="background:var(--paper)"><b style="color:var(--ink)">--paper</b><span style="color:var(--ink-soft)">#ECEFF3 page</span></div>
<div class="sw" style="background:var(--card)"><b style="color:var(--ink)">--card</b><span style="color:var(--ink-soft)">#FFFFFF surfaces</span></div>
<div class="sw" style="background:var(--subtle)"><b style="color:var(--ink)">--subtle</b><span style="color:var(--ink-soft)">#F3F5F9 inputs</span></div>
<div class="sw" style="background:var(--ink)"><b style="color:#fff">--ink</b><span style="color:#cfd6e2">#17233A text</span></div>
<div class="sw" style="background:var(--ink-soft)"><b style="color:#fff">--ink-soft</b><span style="color:#e2e7ef">#5A6B85</span></div>
<div class="sw" style="background:var(--ink-faint)"><b style="color:#fff">--ink-faint</b><span style="color:#eef1f6">#8695AB</span></div>
<div class="sw" style="background:var(--line)"><b style="color:var(--ink)">--line</b><span style="color:var(--ink-soft)">#DCE2EA borders</span></div>
</div></body></html>
