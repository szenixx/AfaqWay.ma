<!-- @dsCard group="Icons" viewport="700x160" name="Status icons — circle housing" subtitle="The one icon signature: same circular badge, only the glyph changes" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:16px 20px}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{flex:1;min-width:70px;border-radius:12px;padding:10px 12px;border:1px solid var(--line)}.sw b{display:block;font:600 11px/16px var(--font-sans)}.sw span{font:400 10px/14px var(--font-sans);opacity:.75}</style></head><body><div class="row" style="gap:28px;justify-content:center">

<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--grey-tint);border:1.5px solid var(--grey-line);color:var(--grey)"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/></svg></span>
<span style="font:500 10.5px/14px var(--font-sans);color:var(--ink-soft)">Not started</span>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--indigo-tint);border:1.5px solid var(--indigo-line);color:var(--indigo-text)"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 2.5 2 9.6l6 2.3 2.3 6L17.5 2.5Z"/><path d="M10.3 11.9 13.7 8.5"/></svg></span>
<span style="font:500 10.5px/14px var(--font-sans);color:var(--ink-soft)">Applied</span>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--amber-tint);border:1.5px solid var(--amber-line);color:var(--amber)"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 6.5v3.7l2.6 1.7"/></svg></span>
<span style="font:500 10.5px/14px var(--font-sans);color:var(--ink-soft)">Under review</span>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--red-tint);border:1.5px solid var(--red-line);color:var(--red)"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 6.7v4M10 13.6h.01"/></svg></span>
<span style="font:500 10.5px/14px var(--font-sans);color:var(--ink-soft)">Needs changes</span>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<span style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--green-tint);border:1.5px solid var(--green-line);color:var(--green)"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M7 10.3 9.2 12.5 13.3 7.8"/></svg></span>
<span style="font:500 10.5px/14px var(--font-sans);color:var(--ink-soft)">Approved</span>
</div>
</div></body></html>
