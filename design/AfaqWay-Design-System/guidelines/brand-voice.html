<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:16px 20px}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{flex:1;min-width:70px;border-radius:12px;padding:10px 12px;border:1px solid var(--line)}.sw b{display:block;font:600 11px/16px var(--font-sans)}.sw span{font:400 10px/14px var(--font-sans);opacity:.75}</style></head><body><div style="display:flex;flex-direction:column;gap:10px">
<div style="font:600 10.5px/14px var(--font-sans);letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint)">Canonical status vocabulary — closed set</div>
<div style="font:600 15px/22px var(--font-sans);color:var(--ink)">Not started · Applied · Under review · Needs changes · Approved</div>
<div style="font:400 12.5px/18px var(--font-sans);color:var(--ink-soft)">Buttons are single active verbs — <b>Continue, Upload, Save draft, Withdraw</b>. Hints explain what happens next, not what the system did. Sentence case everywhere except pills and eyebrows.</div>
</div></body></html>
