<!-- @dsCard group="Colors" viewport="700x150" name="Accent — indigo" subtitle="The one accent; marks the active/primary thing only" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:16px 20px}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.sw{flex:1;min-width:70px;border-radius:12px;padding:10px 12px;border:1px solid var(--line)}.sw b{display:block;font:600 11px/16px var(--font-sans)}.sw span{font:400 10px/14px var(--font-sans);opacity:.75}</style></head><body><div class="row">
<div class="sw" style="background:var(--indigo-700)"><b style="color:#fff">--indigo-700</b><span style="color:#cbd7ef">#22407F pressed</span></div>
<div class="sw" style="background:var(--indigo-600)"><b style="color:#fff">--indigo-600</b><span style="color:#d5def2">#2B4C9B primary</span></div>
<div class="sw" style="background:var(--indigo-500)"><b style="color:#fff">--indigo-500</b><span style="color:#dde5f5">#3D63B4 hover</span></div>
<div class="sw" style="background:var(--indigo-100)"><b style="color:var(--indigo-600)">--indigo-100</b><span style="color:var(--indigo-600)">#EAEFFA tint / focus glow</span></div>
</div></body></html>
