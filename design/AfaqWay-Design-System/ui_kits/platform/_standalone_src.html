<!DOCTYPE html><html><head><meta charset="utf-8"><title>AfaqWay — sample screen</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--paper);font-family:var(--font-sans)}</style></head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#ECEFF3">
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="800" fill="#ECEFF3"></rect>
<circle cx="600" cy="400" r="180" fill="#EAEFFA" stroke="#BFCDEB" stroke-width="14"></circle>
<path d="M690 470 500 555l73 28 28 73 89-186Z" transform="translate(-45,-135) scale(1.35)" fill="none" stroke="#2B4C9B" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</template>
<div id="root"></div>
<script type="text/babel">
const { TopBar, Card, Divider, Field, Button, StatusBadge, StatusPill, Icon, Flag } = window.AfaqWayDesignSystem_b3fe60;
const docs = [
  { name: 'Passport scan', caption: 'Valid until Aug 2031', status: 'approved' },
  { name: 'High-school diploma', caption: 'Uploaded 12 May — a reviewer is looking at it now', status: 'under-review' },
  { name: 'Transcript of records', caption: 'Photo is blurry — upload a clearer scan', status: 'needs-changes' },
  { name: 'Motivation letter', caption: 'Sent with your application on 9 May', status: 'applied' },
  { name: 'English certificate', caption: 'IELTS or TOEFL — add it when you have a result', status: 'not-started' },
];
function DocRow({ d, last }) {
  return (<div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '12px 0' }}>
      <StatusBadge status={d.status} label={d.name} caption={d.caption} />
      <span style={{ flex: 1 }}></span>
      <StatusPill status={d.status} />
    </div>
    {last ? null : <Divider margin={0} />}
  </div>);
}
function App() {
  const [saved, setSaved] = React.useState(false);
  return (<div style={{ minHeight: '100vh' }}>
    <TopBar name="Aisha Rahimova" role="Student" unreadBell />
    <main style={{ maxWidth: 1080, margin: '0 auto', padding: '32px 24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div>
          <div style={{ font: '600 11.5px/16px var(--font-sans)', letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--indigo-600)' }}>Step 2 of 4</div>
          <h1 style={{ font: '700 27px/34px var(--font-sans)', color: 'var(--ink)', margin: '4px 0 0' }}>Tell us about you</h1>
        </div>
        <Card eyebrow="Personal details">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <Field label="Full name" optional="exactly as written in your passport" placeholder="e.g. Aisha Rahimova" hint="We use this on every application you submit" />
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <Field label="Date of birth" type="date" />
              <Field label="Nationality" as="select"><option>🇺🇿 Uzbekistan</option><option>🇰🇿 Kazakhstan</option><option>🇮🇳 India</option></Field>
            </div>
            <div>
              <div style={{ font: '500 13px/20px var(--font-sans)', color: 'var(--ink)', marginBottom: 6 }}>Destination</div>
              <div style={{ display: 'flex', gap: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', border: '1.5px solid var(--indigo-600)', borderRadius: 12, background: 'var(--card)' }}>
                  <Flag size="lg" stripes={['#FDB913', '#006A44', '#C1272D']} selected />
                  <span style={{ font: '500 13.5px/20px var(--font-sans)', color: 'var(--ink)' }}>Lithuania</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', border: '1px solid var(--line)', borderRadius: 12, background: 'var(--subtle)' }}>
                  <Flag size="lg" stripes={['#000', '#DD0000', '#FFCE00']} unavailable />
                  <span style={{ font: '500 13.5px/20px var(--font-sans)', color: 'var(--ink-faint)' }}>Germany — coming soon</span>
                </div>
              </div>
            </div>
          </div>
        </Card>
        <div style={{ display: 'flex', gap: 12 }}>
          <Button variant="ghost">Back</Button>
          <span style={{ flex: 1 }}></span>
          <Button variant="neutral" onClick={() => setSaved(true)}>{saved ? 'Draft saved' : 'Save draft'}</Button>
          <Button size="lg">Continue</Button>
        </div>
      </div>
      <Card eyebrow="Documents" title="Your document dossier">
        <p style={{ font: '400 15px/24px var(--font-sans)', color: 'var(--ink-soft)', margin: '0 0 8px' }}>Upload each document once — we attach it to every application that needs it.</p>
        {docs.map((d, i) => <DocRow key={d.name} d={d} last={i === docs.length - 1} />)}
        <Divider />
        <Button icon={<Icon name="upload" size={18} />}>Upload document</Button>
      </Card>
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
